<div class="todo-app-container">
  <div class="todo-card">
    <header class="todo-header">
      <h1>My Tasks</h1>
      <p class="header-sub">Stay organised, get things done.</p>
    </header>

    <div class="stats-container">
      <div class="stat-box">
        <span class="stat-value">{{ stats().total }}</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat-box">
        <span class="stat-value">{{ stats().active }}</span>
        <span class="stat-label">Active</span>
      </div>
      <div class="stat-box">
        <span class="stat-value">{{ stats().completed }}</span>
        <span class="stat-label">Done</span>
      </div>
    </div>

    <form class="add-todo-form" (submit)="addTodo(); $event.preventDefault()">
      <div class="input-wrapper">
        <input
          type="text"
          [(ngModel)]="newTaskTitle"
          name="newTask"
          placeholder="Add a new task..."
          autocomplete="off"
        />
        <button type="submit" class="add-btn" [disabled]="!newTaskTitle.trim()">+</button>
      </div>
    </form>

    <div class="filter-tabs">
      <button [class.active]="filter() === 'all'" (click)="setFilter('all')">All</button>
      <button [class.active]="filter() === 'active'" (click)="setFilter('active')">Active</button>
      <button [class.active]="filter() === 'completed'" (click)="setFilter('completed')">Completed</button>
    </div>

    <div class="todo-list">
      <div class="empty-state" *ngIf="filteredTodos().length === 0">
        <p>Nothing here yet!</p>
      </div>

      <div
        class="todo-item"
        *ngFor="let todo of filteredTodos()"
        [class.completed]="todo.completed"
      >
        <label class="checkbox-container">
          <input type="checkbox" [checked]="todo.completed" (change)="toggleTodo(todo.id)" />
          <span class="checkmark"></span>
        </label>
        <span class="todo-title">{{ todo.title }}</span>
        <button class="delete-btn" (click)="deleteTodo(todo.id)" aria-label="Delete task">&#10005;</button>
      </div>
    </div>
  </div>
</div>
